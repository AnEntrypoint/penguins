- id: scaffold-dir
  subject: Initialize c:/dev/penguins git repo with package.json
  status: pending
  description: Create directory, git init, package.json with name/version/description
  effort: small
  category: infra
  route_family: grounding
  load: 0.3
  failure_modes: [dir already exists]
  route_fit: dominant
  authorization: witnessed
  blocking: [generate-content]
  blockedBy: []
  acceptance:
    - git rev-parse HEAD returns sha
    - package.json name is "penguins"

- id: generate-content
  subject: Use freddie runTurn to generate penguin species data and facts
  status: pending
  description: Invoke freddie agent (acptoapi/claude backend on 4800) to write species.json (18 species with taxonomy, range, conservation), facts.json (50 facts), and README.md
  effort: large
  category: feature
  route_family: execution
  load: 0.9
  failure_modes: [acptoapi not running, runTurn timeout, LLM rate limit]
  route_fit: dominant
  authorization: witnessed
  blocking: [build-static-site]
  blockedBy: [scaffold-dir]
  acceptance:
    - species.json exists with >=10 entries each having name/scientificName/conservationStatus/range/size
    - facts.json exists with >=30 entries
    - README.md exists >500 bytes

- id: build-static-site
  subject: Build static HTML site from penguin data files
  status: pending
  description: Write index.html (species list + facts highlight), per-species detail pages stub, and site.css; all data loaded from JSON via fetch or inline
  effort: medium
  category: feature
  route_family: representation
  load: 0.7
  failure_modes: [inline JSON too large, browser fetch CORS on file://]
  route_fit: dominant
  authorization: witnessed
  blocking: [penguins-test]
  blockedBy: [generate-content]
  acceptance:
    - index.html loads in browser (HTTP 200 on static server)
    - species count visible in DOM matches species.json length
    - browser-exempt: pure static HTML no behavior change; witness is file existence + valid HTML

- id: penguins-test
  subject: Write test.js asserting all content files valid and site structure complete
  status: pending
  description: One test.js <=200 lines asserting species.json/facts.json valid, README.md >500b, index.html exists
  effort: small
  category: infra
  route_family: observability
  load: 0.4
  failure_modes: []
  route_fit: dominant
  authorization: witnessed
  blocking: []
  blockedBy: [build-static-site]
  acceptance:
    - node test.js exits 0
